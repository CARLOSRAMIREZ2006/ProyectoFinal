server:
  port: 8081

spring:
  application:
    name: hospital_vm

  datasource:
    url: jdbc:mysql://localhost:3307/db_hospital_vm
    username: root
    password: ""

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/